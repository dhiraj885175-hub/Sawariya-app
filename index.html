<script>
const FC={apiKey:"AIzaSyCfkivsOhE2jb5Gh8A0oNpT8f9zC52ksAs",authDomain:"delivery-app-af72d.firebaseapp.com",projectId:"delivery-app-af72d",storageBucket:"delivery-app-af72d.firebasestorage.app",messagingSenderId:"264102586430",appId:"1:264102586430:web:d14b97fe65566cfa2c896f"};
let DB,ADD,COL,SNAP,Q,WHERE,ORD,SET,GET,DOC;
let user=null,cart=[],prods=[],filtCat='all',curProd=null,selSz='',payM='cod';
let unsubP=null,unsubO=null,unsubM=null,unsubPrev=null;

async function initFB(){
  try{
    const {initializeApp}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const {getFirestore,collection,addDoc,onSnapshot,query,where,orderBy,doc,setDoc,getDoc}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const app=initializeApp(FC);
    DB=getFirestore(app);
    ADD=addDoc;COL=n=>collection(DB,n);SNAP=onSnapshot;Q=query;WHERE=where;ORD=orderBy;SET=setDoc;GET=getDoc;DOC=(n,id)=>doc(DB,n,id);
    document.getElementById('ld').classList.add('hidden');
    const sv=localStorage.getItem('sw_cu');
    if(sv){user=JSON.parse(sv);showHome();}
    else show('auth');
  }catch(e){document.querySelector('.l-txt').textContent='Internet ON karo!';}
}
initFB();

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.remove('hidden');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.add('hidden'),2500);}
function show(s){['auth','home','det','cart','checkout','orders','chat','msg'].forEach(x=>{const el=document.getElementById('S_'+x);if(el)el.classList.add('hidden');});const el=document.getElementById('S_'+s);if(el)el.classList.remove('hidden');}

function aTab(n){
  document.getElementById('af0').classList.toggle('hidden',n!==0);
  document.getElementById('af1').classList.toggle('hidden',n!==1);
  document.getElementById('at0').classList.toggle('on',n===0);
  document.getElementById('at1').classList.toggle('on',n===1);
}

async function doLogin(){
  const ph=document.getElementById('lph').value.trim();
  const ps=document.getElementById('lps').value.trim();
  const err=document.getElementById('lerr');
  if(ph.length!==10||!ps){err.textContent='❌ Phone 10 digit aur password!';err.classList.remove('hidden');return;}
  try{
    const sn=await GET(DOC('customers',ph));
    if(!sn.exists()){err.textContent='❌ Account nahi — Register karo!';err.classList.remove('hidden');return;}
    if(sn.data().password!==ps){err.textContent='❌ Password galat!';err.classList.remove('hidden');return;}
    user={phone:ph,name:sn.data().name||'Customer'};
    localStorage.setItem('sw_cu',JSON.stringify(user));
    showHome();
  }catch(e){err.textContent='❌ Error!';err.classList.remove('hidden');}
}

async function doRegister(){
  const nm=document.getElementById('rnm').value.trim();
  const ph=document.getElementById('rph').value.trim();
  const ps=document.getElementById('rps').value.trim();
  const err=document.getElementById('rerr');
  if(!nm||ph.length!==10||ps.length<4){err.textContent='❌ Sab sahi bharo!';err.classList.remove('hidden');return;}
  try{
    await SET(DOC('customers',ph),{name:nm,phone:ph,password:ps,createdAt:new Date().toISOString()});
    user={phone:ph,name:nm};
    localStorage.setItem('sw_cu',JSON.stringify(user));
    showHome();
  }catch(e){err.textContent='❌ Error!';err.classList.remove('hidden');}
}

function doLogout(){if(unsubP)unsubP();localStorage.removeItem('sw_cu');user=null;cart=[];show('auth');}

function showHome(){
  show('home');
  updateBadge();
  if(!unsubP){
    unsubP=SNAP(COL('products'),snap=>{
      prods=snap.docs.map(d=>({id:d.id,...d.data()})).filter(p=>!p.deleted);
      renderCats();renderProds();
    });
  }
}

function go(s){
  if(s==='home')showHome();
  else if(s==='orders')showOrders();
  else if(s==='chat')showChat();
  else if(s==='checkout')showCO();
  else if(s==='cart')showCart();
  else show(s);
}

function renderCats(){
  const cs=['all',...new Set(prods.map(p=>p.category).filter(Boolean))];
  document.getElementById('catList').innerHTML=cs.map(c=>`<button class="catbtn ${filtCat===c?'on':''}" onclick="selCat('${c}')">${c==='all'?'🛍️ Sab':c}</button>`).join('');
}
function selCat(c){filtCat=c;renderCats();renderProds();}
function renderProds(){
  const list=filtCat==='all'?prods:prods.filter(p=>p.category===filtCat);
  const el=document.getElementById('prodGrid');
  if(!list.length){el.innerHTML='<div style="grid-column:span 2;text-align:center;padding:40px;color:#aaa;">Koi product nahi</div>';return;}
  el.innerHTML=list.map(p=>{
    const d=p.mrpPrice&&p.salePrice&&p.mrpPrice>p.salePrice?Math.round((p.mrpPrice-p.salePrice)/p.mrpPrice*100):0;
    return `<div class="pcard" onclick="showDet('${p.id}')">
      <div class="pimg">${p.photo?`<img src="${p.photo}" onerror="this.parentElement.innerHTML='👗'">`:'👗'}</div>
      <div class="pbody">
        <div class="pname">${p.name}</div>
        <div class="pprice"><span class="psale">₹${p.salePrice||p.mrpPrice}</span>${p.mrpPrice>p.salePrice?`<span class="pmrp">₹${p.mrpPrice}</span><span class="pdisc">${d}%</span>`:''}</div>
        <button class="padd" onclick="event.stopPropagation();qAdd('${p.id}')">+ Cart</button>
      </div>
    </div>`;
  }).join('');
}

function showDet(id){
  curProd=prods.find(p=>p.id===id);if(!curProd)return;selSz='';show('det');
  const el=document.getElementById('dImg');
  el.innerHTML=`<button class="det-back" onclick="go('home')">←</button>${curProd.photo?`<img src="${curProd.photo}" onerror="this.outerHTML='👗'">`:'👗'}`;
  document.getElementById('dNm').textContent=curProd.name;
  document.getElementById('dSal').textContent='₹'+(curProd.salePrice||curProd.mrpPrice);
  document.getElementById('dMrp').textContent=curProd.mrpPrice>curProd.salePrice?'₹'+curProd.mrpPrice:'';
  document.getElementById('dDis').textContent=curProd.mrpPrice>curProd.salePrice?Math.round((curProd.mrpPrice-curProd.salePrice)/curProd.mrpPrice*100)+'% OFF':'';
  document.getElementById('dDsc').textContent=curProd.description||'';
  document.getElementById('dSizes').innerHTML=(curProd.sizes||'S,M,L,XL,XXL').split(',').map(s=>`<button class="sbtn" onclick="pSz(this,'${s.trim()}')">${s.trim()}</button>`).join('');
}
function pSz(el,s){document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('on'));el.classList.add('on');selSz=s;}
function qAdd(id){const p=prods.find(x=>x.id===id);if(!p)return;cart.push({...p,selSz:'Free',qty:1});updateBadge();toast('✅ Cart mein add!');}
function addCart(){if(!curProd)return;if(!selSz){toast('❗ Size select karo!');return;}cart.push({...curProd,selSz,qty:1});updateBadge();toast('✅ Added!');go('home');}
function buyNow(){if(!curProd)return;if(!selSz){toast('❗ Size select karo!');return;}cart=[{...curProd,selSz,qty:1}];updateBadge();go('checkout');}
function updateBadge(){document.getElementById('cBadge').textContent=cart.reduce((s,i)=>s+i.qty,0);}

function showCart(){
  show('cart');
  const el=document.getElementById('cartItems');
  if(!cart.length){el.innerHTML='<div class="empty"><div style="font-size:50px;">🛒</div><p>Cart khali hai</p></div>';document.getElementById('cartTot').innerHTML='';return;}
  el.innerHTML=cart.map((it,i)=>`<div class="ci">
    <div class="ci-img">${it.photo?`<img src="${it.photo}">`:'👗'}</div>
    <div style="flex:1;"><div class="ci-nm">${it.name}</div><div class="ci-sz">📏 ${it.selSz}</div><div class="ci-pr">₹${(it.salePrice||it.mrpPrice)*it.qty}</div>
    <div class="qrow"><button class="qbtn" onclick="chQ(${i},-1)">-</button><span style="font-size:14px;font-weight:800;">${it.qty}</span><button class="qbtn" onclick="chQ(${i},1)">+</button>
    <button style="background:#fee2e2;color:#991b1b;border:none;padding:4px 8px;border-radius:6px;font-size:10px;cursor:pointer;margin-left:auto;" onclick="rmIt(${i})">❌</button></div></div>
  </div>`).join('');
  const sub=cart.reduce((s,i)=>s+(i.salePrice||i.mrpPrice)*i.qty,0);
  document.getElementById('cartTot').innerHTML=`<div class="totbox"><div class="totrow"><span>Subtotal</span><span>₹${sub}</span></div><div class="totrow"><span>Delivery</span><span style="color:#38a169;">FREE</span></div><div class="totbig"><span>Total</span><span>₹${sub}</span></div></div>`;
}
function chQ(i,d){cart[i].qty=Math.max(1,cart[i].qty+d);showCart();updateBadge();}
function rmIt(i){cart.splice(i,1);showCart();updateBadge();}

function showCO(){
  show('checkout');
  document.getElementById('coNm').value=user?.name||'';
  document.getElementById('coPh').value=user?.phone||'';
  const sub=cart.reduce((s,i)=>s+(i.salePrice||i.mrpPrice)*i.qty,0);
  document.getElementById('coSum').innerHTML=`<div class="cocard-t">🧾 Summary</div>${cart.map(i=>`<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;"><span>${i.name} x${i.qty}</span><span>₹${(i.salePrice||i.mrpPrice)*i.qty}</span></div>`).join('')}<div style="display:flex;justify-content:space-between;font-size:15px;font-weight:800;color:#f43f8f;border-top:1px solid #e2e8f0;padding-top:8px;margin-top:4px;"><span>Total</span><span>₹${sub}</span></div>`;
}
function sPay(m){payM=m;document.getElementById('pb_cod').classList.toggle('on',m==='cod');document.getElementById('pb_upi').classList.toggle('on',m==='upi');document.getElementById('upiF').classList.toggle('hidden',m!=='upi');}
async function placeOrder(){
  const nm=document.getElementById('coNm').value.trim();
  const ad=document.getElementById('coAd').value.trim();
  const ct=document.getElementById('coCt').value.trim();
  const myPh=(user?.phone||'').trim();
  if(!nm||!ad||!ct){toast('❗ Sab fields bharo!');return;}
  if(!cart.length){toast('❗ Cart khali!');return;}
  const btn=document.getElementById('plBtn');btn.textContent='⏳...';btn.disabled=true;
  try{
    for(const it of cart){
      await ADD(COL('orders'),{customerName:nm,customerPhone:myPh,address:ad+', '+ct,item:it.name,size:it.selSz||'',quantity:it.qty,mrpPrice:it.mrpPrice||0,salePrice:it.salePrice||it.mrpPrice,amount:(it.salePrice||it.mrpPrice)*it.qty,discount:it.mrpPrice&&it.salePrice?Math.round((it.mrpPrice-it.salePrice)/it.mrpPrice*100):0,photo:it.photo||null,paymentMethod:payM,payment:'unpaid',status:'pending',deliveryBoy:'',createdAt:new Date().toISOString()});
    }
    cart=[];updateBadge();toast('🎉 Order ho gaya!');go('orders');
  }catch(e){toast('❌ Error: '+e.message);}
  btn.textContent='🎉 Order Place Karo!';btn.disabled=false;
}

function showOrders(){
  show('orders');
  const el=document.getElementById('ordList');
  el.innerHTML='<div style="text-align:center;padding:20px;color:#aaa;">⏳ Loading...</div>';
  const myPh=(user?.phone||'').trim();
  if(unsubO)unsubO();
  unsubO=SNAP(COL('orders'),snap=>{
    const ords=snap.docs.map(d=>({id:d.id,...d.data()})).filter(o=>(o.customerPhone||'').trim()===myPh).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
    if(!ords.length){el.innerHTML='<div class="empty"><div style="font-size:50px;">📭</div><p style="margin-top:8px;">Koi order nahi</p></div>';return;}
    const cols={pending:'#f6ad55',out:'#4299e1',delivered:'#48bb78',cancelled:'#fc8181'};
    const icons={pending:'⏳',out:'🛵',delivered:'✅',cancelled:'❌'};
    const txts={pending:'Processing',out:'Raaste Mein!',delivered:'Delivered!🎉',cancelled:'Cancelled'};
    el.innerHTML=ords.map(o=>`<div class="ocard" style="border-left-color:${cols[o.status]||'#f6ad55'}">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
        <span class="oid">#${o.id.slice(-6).toUpperCase()}</span>
        <span class="ostatus" style="background:${cols[o.status]||'#f6ad55'}20;color:${cols[o.status]||'#f6ad55'}">${icons[o.status]||'⏳'} ${txts[o.status]||'Processing'}</span>
      </div>
      ${o.photo?`<img src="${o.photo}" style="width:100%;height:130px;object-fit:cover;border-radius:8px;margin-bottom:6px;">`:''}
      <div style="font-size:15px;font-weight:800;">${o.item}</div>
      <div style="font-size:12px;color:#718096;margin-top:3px;">${o.size?'📏 '+o.size:''} ${o.quantity>1?'| x'+o.quantity:''}</div>
      <div style="font-size:17px;font-weight:900;color:#f43f8f;margin-top:4px;">₹${o.amount}</div>
      <div class="stepbox">
        ${[{l:'✅ Order Confirmed',d:true},{l:'🛵 Boy Assigned',d:!!o.deliveryBoy},{l:'🚀 Out for Delivery',d:o.status==='out'||o.status==='delivered'},{l:'🎉 Delivered!',d:o.status==='delivered'}]
        .map((s,i)=>`<div class="steprow"><div class="sdot ${s.d?'on':''}">${s.d?'✓':i+1}</div><span style="font-size:12px;color:${s.d?'#1a1a2e':'#aaa'};font-weight:${s.d?700:400};">${s.l}</span></div>`).join('')}
      </div>
      ${o.deliveryBoy?`<div style="font-size:12px;color:#4a5568;margin-top:6px;">🛵 ${o.deliveryBoy}</div>`:''}
    </div>`).join('');
  });
}

function showChat(){
  show('chat');
  const myPh=(user?.phone||'').trim();
  const cid='chat_'+myPh+'_owner';
  if(unsubPrev)unsubPrev();
  unsubPrev=SNAP(Q(COL('messages'),WHERE('chatId','==',cid),ORD('createdAt','desc')),snap=>{
    if(!snap.empty)document.getElementById('lastPrev').textContent=snap.docs[0].data().text||'';
  });
}
function openMsg(){
  document.getElementById('S_msg').classList.remove('hidden');
  document.getElementById('myPhLbl').textContent='📱 +91 '+(user?.phone||'');
  loadMsgs();
}
function closeMsg(){if(unsubM)unsubM();document.getElementById('S_msg').classList.add('hidden');}
function loadMsgs(){
  const body=document.getElementById('msgBody');
  body.innerHTML='<div style="text-align:center;padding:20px;color:#aaa;">⏳ Loading...</div>';
  if(unsubM)unsubM();
  const myPh=(user?.phone||'').trim();
  const cid='chat_'+myPh+'_owner';
  unsubM=SNAP(Q(COL('messages'),WHERE('chatId','==',cid),ORD('createdAt','asc')),snap=>{
    const msgs=snap.docs.map(d=>d.data());
    if(!msgs.length){body.innerHTML='<div class="empty"><div style="font-size:48px;">👋</div><p style="margin-top:8px;">Owner se baat karo!</p></div>';return;}
    body.innerHTML=msgs.map(m=>{
      const mine=m.senderType==='customer';
      const d=new Date(m.createdAt||'');
      const t=isNaN(d.getTime())?'':d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
      return `<div style="display:flex;flex-direction:column;align-items:${mine?'flex-end':'flex-start'};">
        <div class="bub ${mine?'bme':'bthem'}">${m.text||''}<div class="bt">${t}${mine?' ✓✓':''}</div></div>
      </div>`;
    }).join('');
    body.scrollTop=body.scrollHeight;
  });
}
async function sendMsg(){
  const inp=document.getElementById('mInp');
  const text=inp.value.trim();if(!text)return;
  const myPh=(user?.phone||'').trim();
  const cid='chat_'+myPh+'_owner';
  try{
    await ADD(COL('messages'),{chatId:cid,text,senderType:'customer',senderPhone:myPh,senderName:user?.name||'Customer',receiverType:'owner',createdAt:new Date().toISOString()});
    inp.value='';
  }catch(e){toast('❌ Error!');}
}
</script>
</body>
</html>
